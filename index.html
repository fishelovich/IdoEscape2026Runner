<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שלט רחוק - חדר בריחה</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #121212; 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            overflow: hidden;
        }
        .controller {
            width: 90%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #f1c40f;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
            text-align: center;
        }
        input {
            width: 80%;
            padding: 15px;
            margin: 20px 0;
            font-size: 20px;
            border-radius: 10px;
            border: none;
            text-align: center;
        }
        button {
            width: 85%;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }
        .hint { color: #888; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="controller">
    <h2 style="color:#f1c40f; margin-bottom: 0;">מרכז שליטה</h2>
    <p style="font-size: 14px;">הזינו קוד והוא יתעדכן בלשונית המשחק</p>
    
    <input type="text" id="code" placeholder="הכנס קוד..." autocomplete="off">
    <br>
    <button onclick="updateGame()">שלח לשלב הבא</button>
    
    <div class="hint">
        <b>טיפ למובייל:</b> השאירו את הדף הזה פתוח ועברו בין הלשוניות בדפדפן.
    </div>
</div>

<script>
    let gameWindow = null;

    function updateGame() {
        const val = document.getElementById('code').value.trim().toLowerCase();
        // אם זה הקוד הראשון, פתח את האתר המקורי של עידו
        const targetUrl = val ? "https://sites.google.com/view/" + val : "https://sites.google.com/view/escaperoom2026ido";

        if (!gameWindow || gameWindow.closed) {
            // פתיחת חלון חדש בפעם הראשונה
            gameWindow = window.open(targetUrl, "IdoEscapeGame");
        } else {
            // עדכון החלון הקיים בלי שהמשתמש יצטרך לפתוח חדש
            gameWindow.location.href = targetUrl;
            gameWindow.focus();
        }
        
        document.getElementById('code').value = "";
    }
</script>

</body>
</html>
