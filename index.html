<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז פיצוח - חדר בריחה 2026</title>
    <style>
        :root {
            --primary: #f1c40f;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --success: #27ae60;
        }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 2px solid #333;
            text-align: center;
        }
        h1 { color: var(--primary); margin-bottom: 10px; font-size: 28px; }
        p { color: #aaa; margin-bottom: 30px; }
        .input-wrapper { margin-bottom: 25px; }
        input {
            width: 85%;
            padding: 15px;
            border: 2px solid #444;
            border-radius: 12px;
            background: #2c2c2c;
            color: white;
            font-size: 20px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary); }
        button {
            width: 90%;
            padding: 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:active { transform: scale(0.96); background: #2ecc71; }
        .footer-note { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>מנוע ניווט</h1>
    <p>הזינו את הקוד שמצאתם כדי לעבור לשלב הבא</p>
    
    <div class="input-wrapper">
        <input type="text" id="passcode" placeholder="הקוד כאן..." autocomplete="off" spellcheck="false">
    </div>
    
    <button onclick="navigate()">פצח ועבור שלב</button>
    
    <div class="footer-note">מבוסס על חדר הבריחה של עידו 2026</div>
</div>

<script>
    function navigate() {
        const code = document.getElementById('passcode').value.trim().toLowerCase();
        
        if (code === "") {
            alert("אנא הזינו קוד.");
            return;
        }

        // בניית הכתובת - שים לב: זה יעביר את המשתמש לאתר של עידו באותו טאב
        const targetUrl = "https://sites.google.com/view/" + code;
        
        // הפעולה הזו עובדת ב-GitHub Pages בצורה חלקה
        window.location.href = targetUrl;
    }

    // מאפשר לחיצה על Enter במקלדת
    document.getElementById('passcode').addEventListener("keypress", function(e) {
        if (e.key === "Enter") navigate();
    });
</script>

</body>
</html>
