<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מרכז בקרה - חדר בריחה</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #121212; }
        
        /* פאנל ההזנה - נשאר למעלה כל הזמן */
        #control-bar {
            height: 80px;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 15px;
            border-bottom: 2px solid #f1c40f;
            box-sizing: border-box;
            z-index: 100;
        }

        input {
            flex: 1;
            max-width: 200px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2c2c2c;
            color: white;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        /* האזור שבו מוצג המשחק */
        #content-area {
            height: calc(100% - 80px);
            width: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .blocked-message {
            padding: 20px;
            color: #333;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div id="control-bar">
    <input type="text" id="pass" placeholder="הכנס קוד..." autocomplete="off">
    <button onclick="go()">פצח!</button>
</div>

<div id="content-area">
    <iframe id="game-frame" src="https://sites.google.com/view/escaperoom2026ido"></iframe>
</div>

<script>
    function go() {
        const code = document.getElementById('pass').value.trim().toLowerCase();
        if (!code) return;

        const url = "https://sites.google.com/view/" + code;
        const frame = document.getElementById('game-frame');
        
        // עדכון ה-iframe
        frame.src = url;
        
        // ניקוי הקלט
        document.getElementById('pass').value = "";
    }

    // תמיכה ב-Enter
    document.getElementById('pass').addEventListener("keypress", function(e) {
        if (e.key === "Enter") go();
    });
</script>

</body>
</html>
