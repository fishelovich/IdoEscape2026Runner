<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנוע חדר בריחה 2026</title>
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: #121212; 
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* אזור ההוראות והפתיחה */
        .header {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #f1c40f; font-size: 24px; margin-bottom: 10px; }
        
        /* פאנל השליטה התחתון - נשאר קבוע */
        .control-panel {
            background: #1e1e1e;
            padding: 20px;
            border-top: 3px solid #f1c40f;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        input {
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #333;
            background: #2c2c2c;
            color: white;
            text-align: center;
        }
        button {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .status {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>חדר בריחה 2026</h1>
    <p>המשחק יפתח בלשונית נפרדת.<br>בכל פעם שתמצאו קוד, חזרו לכאן כדי להזין אותו ולעבור לשלב הבא.</p>
    <button onclick="openOriginal()" style="background:#2980b9; padding: 10px 20px; font-size: 16px;">פתח את דף הפתיחה</button>
</div>

<div class="control-panel">
    <div class="input-group">
        <input type="text" id="answer" placeholder="הכנס קוד שלב כאן..." autocomplete="off">
        <button onclick="navigate()">פצח ועבור שלב!</button>
    </div>
    <div class="status" id="status">ממתין לקוד הראשון...</div>
</div>

<script>
    let gameWindow = null;

    function openOriginal() {
        // פותח את דף הפתיחה המקורי שביקשת
        gameWindow = window.open("https://sites.google.com/view/escaperoom2026ido", "IdoEscape");
        document.getElementById('status').innerText = "המשחק פתוח בלשונית השנייה";
    }

    function navigate() {
        const val = document.getElementById('answer').value.trim().toLowerCase();
        if (!val) return;

        const targetUrl = "https://sites.google.com/view/" + val;

        // אם החלון כבר פתוח, נעדכן אותו. אם לא, נפתח חדש.
        if (gameWindow && !gameWindow.closed) {
            gameWindow.location.href = targetUrl;
            gameWindow.focus();
        } else {
            gameWindow = window.open(targetUrl, "IdoEscape");
        }

        document.getElementById('status').innerText = "עובר לשלב: " + val;
        document.getElementById('answer').value = "";
    }

    // תמיכה ב-Enter
    document.getElementById('answer').addEventListener("keypress", function(e) {
        if (e.key === "Enter") navigate();
    });
</script>

</body>
</html>
