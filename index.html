<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנוע חדר בריחה</title>
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 90%; 
            max-width: 400px; 
            text-align: center;
            border: 1px solid #333;
        }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 20px 0; 
            border-radius: 10px; 
            border: 2px solid #3498db; 
            background: #2c2c2c; 
            color: white; 
            font-size: 18px; 
            box-sizing: border-box;
            text-align: center;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.95); background: #2ecc71; }
    </style>
</head>
<body>

<div class="card">
    <h2>פצח את השלב</h2>
    <p>הזן את הקוד שגילית:</p>
    <input type="text" id="answer" placeholder="הקלד כאן..." autocomplete="off">
    <button onclick="go()">שגר אותי!</button>
</div>

<script>
    function go() {
        const sol = document.getElementById('answer').value.trim().toLowerCase();
        if (sol) {
            // באתר חיצוני זה יעבוד חלק ויחליף את הדף הנוכחי
            window.location.href = "https://sites.google.com/view/" + sol;
        }
    }
    
    // תמיכה ב-Enter במקלדת של הנייד
    document.getElementById('answer').addEventListener("keypress", function(e) {
        if (e.key === "Enter") go();
    });
</script>

</body>
</html>
